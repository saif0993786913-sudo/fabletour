        let currentActiveBtn = null;

        function init() {
            renderList(citiesData);
            document.getElementById('search-input').addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                const filtered = citiesData.filter(city =>
                    city.name.toLowerCase().includes(term) ||
                    city.subtitle.toLowerCase().includes(term)
                );
                renderList(filtered);
            });
        }

        function renderList(data) {
            const listContainer = document.getElementById('city-list');
            listContainer.innerHTML = '';
            if(data.length === 0) {
                listContainer.innerHTML = '<p class="text-slate-400 text-center text-sm mt-4">No cities found.</p>';
                return;
            }
            data.forEach(city => {
                const btn = document.createElement('button');
                btn.className = 'w-full text-left px-4 py-3 rounded-xl border border-slate-200 bg-white hover:bg-emerald-50 transition-all duration-200 flex flex-col focus:outline-none focus:ring-2 focus:ring-emerald-500';
                if(currentActiveBtn && currentActiveBtn.dataset.id === city.id) {
                    btn.classList.add('bg-emerald-600', 'text-white', 'border-emerald-700', 'shadow-md');
                    btn.classList.remove('bg-white', 'border-slate-200');
                    btn.innerHTML = `<span class="font-bold text-white text-base md:text-lg">${city.name}</span><span class="text-xs text-emerald-100 mt-0.5 line-clamp-1">${city.subtitle}</span>`;
                    currentActiveBtn = btn;
                } else {
                    btn.innerHTML = `<span class="font-bold text-slate-800 text-base md:text-lg">${city.name}</span><span class="text-xs text-slate-500 mt-0.5 line-clamp-1">${city.subtitle}</span>`;
                }
                btn.dataset.id = city.id;
                btn.onclick = () => renderCity(city, btn);
                listContainer.appendChild(btn);
            });
        }

        function renderCity(city, btnElement) {
            if (currentActiveBtn) {
                currentActiveBtn.classList.remove('bg-emerald-600', 'border-emerald-700', 'shadow-md');
                currentActiveBtn.classList.add('bg-white', 'border-slate-200');
                currentActiveBtn.querySelector('span:first-child').classList.remove('text-white');
                currentActiveBtn.querySelector('span:first-child').classList.add('text-slate-800');
                currentActiveBtn.querySelector('span:last-child').classList.remove('text-emerald-100');
                currentActiveBtn.querySelector('span:last-child').classList.add('text-slate-500');
            }
            btnElement.classList.remove('bg-white', 'border-slate-200', 'hover:bg-emerald-50');
            btnElement.classList.add('bg-emerald-600', 'border-emerald-700', 'shadow-md');
            btnElement.querySelector('span:first-child').classList.remove('text-slate-800');
            btnElement.querySelector('span:first-child').classList.add('text-white');
            btnElement.querySelector('span:last-child').classList.remove('text-slate-500');
            btnElement.querySelector('span:last-child').classList.add('text-emerald-100');
            currentActiveBtn = btnElement;

            const generateParagraphs = (paragraphs) => paragraphs.map(p => `<p class="mb-4 text-base md:text-lg leading-relaxed text-slate-700 font-serif text-justify">${p}</p>`).join('');

            const contentArea = document.getElementById('content-area');
            contentArea.classList.remove('fade-in');
            void contentArea.offsetWidth;
            contentArea.innerHTML = `
                <div class="mb-8 md:mb-10 pb-6 border-b border-slate-200">
                    <h2 class="text-3xl md:text-5xl font-extrabold text-slate-900 tracking-tight mb-2 md:mb-3">${city.name}</h2>
                    <p class="text-lg md:text-xl text-emerald-600 font-medium">${city.subtitle}</p>
                </div>
                <div class="space-y-10 md:space-y-12">
                    <section>
                        <div class="flex items-start mb-3 md:mb-4">${icons.geography}<h3 class="text-xl md:text-2xl font-bold text-slate-800">Geographical Context</h3></div>
                        <div class="pl-0 md:pl-9">${generateParagraphs(city.geography)}</div>
                    </section>
                    <section>
                        <div class="flex items-start mb-3 md:mb-4">${icons.history}<h3 class="text-xl md:text-2xl font-bold text-slate-800">Historical Legacy</h3></div>
                        <div class="pl-0 md:pl-9">${generateParagraphs(city.history)}</div>
                    </section>
                    <section>
                        <div class="flex items-start mb-3 md:mb-4">${icons.politics}<h3 class="text-xl md:text-2xl font-bold text-slate-800">Political Landscape</h3></div>
                        <div class="pl-0 md:pl-9">${generateParagraphs(city.politics)}</div>
                    </section>
                </div>
                <div class="mt-12 pt-8 border-t border-slate-200 text-center">
                    <p class="text-slate-500 mb-4">Experience ${city.name} in person on our 7-Day Iraq Heritage Tour</p>
                    <a href="https://book.fabletour.com/book-tour.html" target="_blank" class="inline-block bg-emerald-600 text-white font-bold text-base px-8 py-4 rounded-full hover:bg-emerald-700 transition shadow-lg">Book Your Tour Now</a>
                </div>
            `;
            contentArea.classList.add('fade-in');
            if (window.innerWidth < 768) {
                document.getElementById('main-scroll').scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        window.onload = init;
    </script>
</body>
</html>
